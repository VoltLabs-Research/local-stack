services:
  volt-mongodb:
    image: mongo:8.0.5
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: volt
      MONGO_INITDB_ROOT_PASSWORD: volt
      MONGO_INITDB_DATABASE: volt
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --host localhost --username $$MONGO_INITDB_ROOT_USERNAME --password $$MONGO_INITDB_ROOT_PASSWORD --authenticationDatabase admin --eval \"db.adminCommand('ping').ok\" | grep 1"]
      interval: 10s
      timeout: 5s
      retries: 20
    volumes:
      - volt-mongodb-data:/data/db

  volt-redis:
    image: redis:7.4.2-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "voltredis"]
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a voltredis ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 20
    volumes:
      - volt-redis-data:/data

  volt-minio:
    image: minio/minio:RELEASE.2025-02-28T09-55-16Z
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: voltminio
      MINIO_ROOT_PASSWORD: voltminiosecret
    command: server /data --console-address ":9001"
    ports:
      - "${VOLT_DEV_MINIO_PORT:-9000}:9000"
      - "${VOLT_DEV_MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - volt-minio-data:/data

  volt-server:
    build:
      context: "${VOLT_DEV_VOLT_SERVER_DIR}"
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    env_file:
      - ./.generated/server.env
    depends_on:
      volt-mongodb:
        condition: service_healthy
      volt-redis:
        condition: service_healthy
      volt-minio:
        condition: service_started
    ports:
      - "8000:8000"
    volumes:
      - "${VOLT_DEV_VOLT_SERVER_DIR}:/app"
      - /app/node_modules

  volt-client:
    build:
      context: "${VOLT_DEV_VOLT_CLIENT_DIR}"
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    env_file:
      - ./.generated/client.env
    environment:
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    depends_on:
      - volt-server
    ports:
      - "5173:5173"
    volumes:
      - "${VOLT_DEV_VOLT_CLIENT_DIR}:/app"
      - /app/node_modules

volumes:
  volt-mongodb-data:
  volt-redis-data:
  volt-minio-data:
