services:
  volt-mongodb:
    image: mongo:8.0.5
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: volt
      MONGO_INITDB_ROOT_PASSWORD: volt
      MONGO_INITDB_DATABASE: volt
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --host localhost --username $$MONGO_INITDB_ROOT_USERNAME --password $$MONGO_INITDB_ROOT_PASSWORD --authenticationDatabase admin --eval \"db.adminCommand('ping').ok\" | grep 1"]
      interval: 10s
      timeout: 5s
      retries: 20
    volumes:
      - volt-mongodb-data:/data/db

  volt-redis:
    image: redis:7.4.2-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "voltredis"]
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a voltredis ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 20
    volumes:
      - volt-redis-data:/data

  volt-minio:
    image: minio/minio:RELEASE.2025-02-28T09-55-16Z
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: voltminio
      MINIO_ROOT_PASSWORD: voltminiosecret
    command: server /data --console-address ":9001"
    ports:
      - "${VOLT_DEV_MINIO_PORT:-9000}:9000"
      - "${VOLT_DEV_MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - volt-minio-data:/data

  volt-server:
    build:
      context: "${VOLT_DEV_VOLT_SERVER_DIR}"
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    environment:
      NODE_ENV: development
      LOG_LEVEL: info
      REDIS_HOST: volt-redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: voltredis
      MINIO_ENDPOINT: volt-minio
      MINIO_PORT: 9000
      MINIO_USE_SSL: "false"
      MINIO_ACCESS_KEY: voltminio
      MINIO_SECRET_KEY: voltminiosecret
      MINIO_PUBLIC_URL: "${VOLT_DEV_PUBLIC_MINIO_URL}"
      SERVER_ENDPOINT: "${VOLT_DEV_PUBLIC_API_URL}"
      SERVER_PORT: 8000
      SERVER_HOST: 0.0.0.0
      SERVER_HOSTNAME: localhost
      SERVER_SCHEMA: http
      TEAM_CLUSTER_APP_PROXY_BIND_HOST: 0.0.0.0
      CLIENT_HOST: "${VOLT_DEV_PUBLIC_WEB_URL}"
      CLIENT_DEV_HOST: "${VOLT_DEV_PUBLIC_WEB_URL}"
      MONGO_URI: mongodb://volt:volt@volt-mongodb:27017?authSource=admin
      MONGO_AUTH_SOURCE: admin
      PRODUCTION_DATABASE: voltcloud@production
      DEVELOPMENT_DATABASE: voltcloud@development
      SSH_ENCRYPTION_KEY: volt-dev-ssh-key
      JWT_EXPIRATION_DAYS: 7d
      SECRET_KEY: volt-dev-secret-key
      TEAM_CLUSTER_TCP_RELAY_BIND_HOST: 0.0.0.0
      TEAM_CLUSTER_TCP_RELAY_ADVERTISED_HOST: volt-server
      TEAM_CLUSTER_TCP_RELAY_PORT_START: 23000
      TEAM_CLUSTER_TCP_RELAY_PORT_END: 23999
      TEAM_CLUSTER_TAILSCALE_ENABLED: "false"
      TEAM_CLUSTER_TAILSCALE_REQUIRED: "false"
    depends_on:
      volt-mongodb:
        condition: service_healthy
      volt-redis:
        condition: service_healthy
      volt-minio:
        condition: service_started
    ports:
      - "8000:8000"
      - "24000-24999:24000-24999"
    volumes:
      - "${VOLT_DEV_VOLT_SERVER_DIR}:/app"
      - /app/node_modules

  volt-client:
    build:
      context: "${VOLT_DEV_VOLT_CLIENT_DIR}"
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    environment:
      VITE_ENV: development
      VITE_API_URL: "${VOLT_DEV_PUBLIC_API_URL}"
      VITE_PROXY_API_URL: "${VOLT_DEV_INTERNAL_API_URL}"
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    depends_on:
      - volt-server
    ports:
      - "5173:5173"
    volumes:
      - "${VOLT_DEV_VOLT_CLIENT_DIR}:/app"
      - /app/node_modules

volumes:
  volt-mongodb-data:
  volt-redis-data:
  volt-minio-data:
